<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Fashion Store</title>
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
            background-color: #121212; color: white;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        .login-box {
            background-color: #1e1e1e; padding: 40px; border-radius: 12px;
            text-align: center; width: 320px; border: 1px solid #333;
            box-shadow: 0 0 30px rgba(189, 0, 255, 0.2);
        }
        h2 { color: #d000ff; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        input {
            width: 100%; padding: 12px; margin: 10px 0;
            background-color: #2c2c2c; border: 1px solid #444; color: white; border-radius: 6px;
            box-sizing: border-box; outline: none;
        }
        input:focus { border-color: #d000ff; }
        
        .action-btn {
            width: 100%; padding: 12px; margin-top: 15px;
            background-color: #d000ff; border: none; color: white;
            font-weight: bold; cursor: pointer; border-radius: 6px; font-size: 16px;
            transition: 0.3s;
        }
        .action-btn:hover { background-color: #bd00ff; box-shadow: 0 0 15px #d000ff; }
        
        .toggle-link {
            margin-top: 20px; font-size: 14px; color: #aaa; cursor: pointer; text-decoration: underline;
        }
        .toggle-link:hover { color: #fff; }

        .error-msg {
            color: #ff4444; font-size: 13px; margin-top: 10px; display: none;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2 id="form-title">ВХОД</h2>
        
        <input type="email" id="email" placeholder="Email адрес">
        <input type="password" id="password" placeholder="Парола (мин. 6 символа)">
        
        <p id="error-text" class="error-msg"></p>

        <button class="action-btn" id="submit-btn">ВЛЕЗ</button>

        <div class="toggle-link" id="toggle-mode">Нямаш акаунт? Регистрирай се тук</div>
    </div>

    <script type="module">
        // 1. Импорт на Firebase Authentication
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Твоята конфигурация
        const firebaseConfig = {
            apiKey: "AIzaSyCEu5mpMHT7REOcHk9LiHCOyqzbfahFqB0",
            authDomain: "magazine-9e774.firebaseapp.com",
            projectId: "magazine-9e774",
            storageBucket: "magazine-9e774.firebasestorage.app",
            messagingSenderId: "865604014690",
            appId: "1:865604014690:web:11aa52fa2c8f34b462373b",
            measurementId: "G-Z44LH253C4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Логика за смяна между Вход и Регистрация
        let isLoginMode = true;
        const title = document.getElementById('form-title');
        const btn = document.getElementById('submit-btn');
        const toggle = document.getElementById('toggle-mode');
        const errorText = document.getElementById('error-text');

        toggle.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            errorText.style.display = 'none';
            if(isLoginMode) {
                title.innerText = "ВХОД";
                btn.innerText = "ВЛЕЗ";
                toggle.innerText = "Нямаш акаунт? Регистрирай се тук";
            } else {
                title.innerText = "РЕГИСТРАЦИЯ";
                btn.innerText = "СЪЗДАЙ АКАУНТ";
                toggle.innerText = "Вече имаш акаунт? Влез тук";
            }
        });

        // Основна функция
        btn.addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            errorText.style.display = 'none';

            if(!email || !password) {z  
                showError("Моля попълнете всички полета");
                return;
            }

            try {
                if (isLoginMode) {
                    // --- ВХОД ---
                    await signInWithEmailAndPassword(auth, email, password);
                    // Успешен вход -> отиваме на началната страница
                    window.location.href = "index.html"; 
                } else {
                    // --- РЕГИСТРАЦИЯ ---
                    await createUserWithEmailAndPassword(auth, email, password);
                    alert("Регистрацията успешна! Добре дошъл.");
                    window.location.href = "index.html";
                }
            } catch (error) {
                console.error(error);
                let msg = "Грешка!";
                if(error.code === 'auth/invalid-credential') msg = "Грешен имейл или парола!";
                if(error.code === 'auth/email-already-in-use') msg = "Този имейл вече е регистриран!";
                if(error.code === 'auth/weak-password') msg = "Паролата трябва да е поне 6 символа!";
                showError(msg);
            }
        });

        function showError(msg) {
            errorText.innerText = msg;
            errorText.style.display = 'block';
        }
    </script>
</body>
</html>
