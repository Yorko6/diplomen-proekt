<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion Store - Home</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- СТИЛОВЕ ЗА НАЧАЛНАТА СТРАНИЦА --- */
        .hero-section {
            height: 85vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1523396884775-65aa46cdcf03?q=80&w=1920&auto=format&fit=crop');
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center; text-align: center;
        }
        .hero-content h1 {
            font-size: 60px; text-transform: uppercase; color: white; margin-bottom: 10px;
            letter-spacing: 5px; text-shadow: 0 0 20px rgba(208, 0, 255, 0.6);
        }
        .hero-content h1 span { color: #d000ff; }
        .hero-content p { font-size: 20px; color: #ddd; margin-bottom: 30px; letter-spacing: 2px; }
        
        .hero-btn {
            padding: 15px 40px; background-color: transparent; border: 2px solid #d000ff;
            color: #d000ff; font-size: 18px; font-weight: bold; text-transform: uppercase;
            cursor: pointer; transition: 0.3s; border-radius: 50px; text-decoration: none; display: inline-block;
        }
        .hero-btn:hover {
            background-color: #d000ff; color: white; box-shadow: 0 0 30px #d000ff; transform: scale(1.05);
        }

        .features-bar {
            display: flex; justify-content: space-around; padding: 40px 20px;
            background-color: #1a1a1a; border-bottom: 1px solid #333; flex-wrap: wrap;
        }
        .feature-item { text-align: center; color: white; max-width: 300px; margin: 10px; }
        .feature-item i { font-size: 30px; color: #d000ff; margin-bottom: 15px; }
        #user-info { font-size: 14px; color: #aaa; margin-right: 15px; }

        /* --- НОВИЯТ ДИЗАЙН ЗА БУТОНА ВХОД/ИЗХОД --- */
        .auth-btn-styled {
            background-color: #d000ff; /* Лилав фон */
            color: white !important;
            padding: 10px 25px;       /* Повече място около текста */
            border-radius: 25px;      /* Заоблени краища */
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            border: 2px solid #d000ff;
            transition: 0.3s;
            margin-left: 10px;
            box-shadow: 0 0 10px rgba(208, 0, 255, 0.3); /* Леко сияние */
        }

        .auth-btn-styled:hover {
            background-color: transparent; /* Става прозрачен при мишка */
            color: #d000ff !important;     /* Текстът става лилав */
            box-shadow: 0 0 20px #d000ff;  /* Сиянието се засилва */
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">FashionStore</div>
        <div class="nav-links" style="display: flex; align-items: center;">
            <span id="user-info">Гост</span>
            
            <a href="shop.html" style="color: white; font-weight: bold; margin-right: 15px; text-decoration: none;">МАГАЗИН</a>
            
            <a href="login.html" id="auth-btn" class="auth-btn-styled">ВХОД</a>
        </div>
    </header>

    <section class="hero-section">
        <div class="hero-content">
            <h1>NEW ERA OF <br> <span>STREETWEAR</span></h1>
            <p>Premium quality. Unique designs. Limited drops.</p>
            <a href="shop.html" class="hero-btn">SHOP COLLECTION</a>
        </div>
    </section>

    <div class="features-bar">
        <div class="feature-item"><i class="fas fa-shipping-fast"></i><h4>Бърза Доставка</h4><p>Доставяме до 24 часа.</p></div>
        <div class="feature-item"><i class="fas fa-tshirt"></i><h4>Високо Качество</h4><p>100% Памук и премиум материи.</p></div>
        <div class="feature-item"><i class="fas fa-undo"></i><h4>Лесно Връщане</h4><p>Преглед и тест преди плащане.</p></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEu5mpMHT7REOcHk9LiHCOyqzbfahFqB0",
            authDomain: "magazine-9e774.firebaseapp.com",
            projectId: "magazine-9e774",
            storageBucket: "magazine-9e774.firebasestorage.app",
            messagingSenderId: "865604014690",
            appId: "1:865604014690:web:11aa52fa2c8f34b462373b",
            measurementId: "G-Z44LH253C4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const authBtn = document.getElementById('auth-btn');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // АКО СИ ВЛЯЗЪЛ
                document.getElementById('user-info').innerText = user.email;
                
                authBtn.innerText = "ИЗХОД";
                authBtn.href = "#"; // Махаме линка, за да не презарежда
                
                // При клик се отписваш
                authBtn.onclick = (e) => {
                    e.preventDefault(); // Спираме стандартното действие на линка
                    signOut(auth).then(() => window.location.reload());
                };
            } else {
                // АКО СИ ГОСТ
                document.getElementById('user-info').innerText = "Гост";
                
                authBtn.innerText = "ВХОД";
                authBtn.href = "login.html"; // Връщаме линка към логин страницата
                authBtn.onclick = null; // Махаме JS функцията
            }
        });
    </script>
</body>
</html>
